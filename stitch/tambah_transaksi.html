<script>
        function selectCategory(element) {
            // Remove active state from all
            document.querySelectorAll('.active-category').forEach(el => {
                el.classList.remove('active-category', 'bg-primary-container', 'text-on-primary-container');
                el.querySelector('span:last-child').classList.remove('text-on-primary-container');
                el.querySelector('span:last-child').classList.add('text-on-surface-variant');
            });
            
            // Add active state to clicked
            element.classList.add('active-category', 'bg-primary-container');
            element.querySelector('span:last-child').classList.add('text-on-primary-container');
            element.querySelector('span:last-child').classList.remove('text-on-surface-variant');
        }

        // Form submission micro-interaction
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const btn = this;
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Saving...';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Success!';
                btn.classList.replace('bg-primary', 'bg-secondary');
                
                setTimeout(() => {
                   // In a real app, route back
                   btn.innerHTML = originalContent;
                   btn.disabled = false;
                   btn.classList.replace('bg-secondary', 'bg-primary');
                }, 1500);
            }, 800);
        });
    </script>
